<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script
      type="module"
      src="https://justwasm.github.io/wanix/dist/wanix.min.js"
    ></script>
  </head>
  <body style="height: 100vh; margin: 0">
    <!-- a wanix system is an empty root task/namespace -->
    <wanix-system
      wasm="https://w9y.up.railway.app/go/github.com/justwasm/wanix/wasm@v0.3.11"
      debug
    >
      <!-- bind the task, term, and web namespaces to the system -->
      <wanix-bind dst="task" src="#task"></wanix-bind>
      <wanix-bind dst="term" src="#term"></wanix-bind>
      <wanix-bind dst="web" src="#web"></wanix-bind>
      <wanix-bind dst="js" src="#js"></wanix-bind>
      <wanix-bind dst="opfs" src="#web/opfs" mode="0755"></wanix-bind>
      <wanix-bind dst="tmp" src="#ramfs"></wanix-bind>
      <wanix-bind type="archive" dst="." src="https://no-cors.up.railway.app/https://github.com/justwasm/go/releases/download/go1.27.0-go4js.1/go1.27.0-go4js.1.js-wasm.src.min.tar.gz"></wanix-bind>

      <!-- fetch hush wasm into the namespace -->
      <wanix-bind
        type="fetch"
        dst="hush"
        src="https://w9y.up.railway.app/go/github.com/btwiuse/hush/cmd/hush@v0.4.17"
        mode="0755"
      ></wanix-bind>

      <wanix-bind
        type="fetch"
        dst="w9y"
        src="https://w9y.up.railway.app/go/github.com/btwiuse/w9y/cmd/w9y@latest"
        mode="0755"
      ></wanix-bind>

      <!-- run bubbletea as gojs task with TERM_WINCH pointing to term's winch file -->
      <wanix-task
        id="repl"
        cmd="hush"
        type="gojs"
        env="TERM=xterm-256color COLORTERM=truecolor CLICOLOR_FORCE=1 WANIX=/opfs/wanix HOME=/opfs/home PATH=/opfs/wanix/go/bin:/opfs/wanix CRUSH_CORE_UTILS=1 DO_NOT_TRACK=1 CRUSH_DISABLE_PROVIDER_AUTO_UPDATE=1 TERM_WINCH=/winch GOROOT=/go GOPATH=/opfs/gopath GOTOOLDIR=/opfs/wanix/go/pkg/tool/js_wasm"
        term
        start
      >
        <wanix-bind dst="winch" src="#task/self/term/winch"></wanix-bind>
      </wanix-task>

      <!-- render the terminal for the repl -->
      <wanix-term raw no-scrollbar path="#task/repl/term"></wanix-term>
    </wanix-system>
  </body>
</html>
