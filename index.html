<!DOCTYPE html>

    <meta charset="utf-8" />

  <body style="height: 100vh; margin: 0">
    <!-- a wanix system is an empty root task/namespace -->
    <wanix-system
      wasm="https://w9y.up.railway.app/go/github.com/justwasm/wanix/wasm@v0.3.6"
      debug
    >
      <!-- bind the task, term, and web namespaces to the system -->
      <wanix-bind dst="task" src="#task"></wanix-bind>
      <wanix-bind dst="term" src="#term"></wanix-bind>
      <wanix-bind dst="web" src="#web"></wanix-bind>
      <wanix-bind dst="js" src="#js"></wanix-bind>
      <wanix-bind dst="crush" src="#web/opfs"></wanix-bind>
      <wanix-bind dst="tmp" src="#ramfs"></wanix-bind>

      <!-- fetch hush wasm into the namespace -->
      <wanix-bind
        type="fetch"
        dst="hush"
        src="https://w9y.up.railway.app/go/github.com/btwiuse/hush/cmd/hush@v0.4.16"
        mode="0755"
      ></wanix-bind>
      <wanix-bind

      <!-- run bubbletea as gojs task with TERM_WINCH pointing to term's winch file -->
      <wanix-task
        id="repl"
        cmd="hush"
        type="gojs"
        env="TERM=xterm-256color COLORTERM=truecolor CLICOLOR_FORCE=1 WANIX=/crush/wanix/ HOME=/crush/home PATH=/crush/wanix CRUSH_CORE_UTILS=1 DO_NOT_TRACK=1 CRUSH_DISABLE_PROVIDER_AUTO_UPDATE=1 TERM_WINCH=/winch"
        term
        start
      >
        <wanix-bind dst="winch" src="#task/self/term/winch"></wanix-bind>
      </wanix-task>

      <!-- render the terminal for the repl -->
      <wanix-term raw no-scrollbar path="#task/repl/term"></wanix-term>
    </wanix-system>
